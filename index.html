<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Texture Maker</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="toast-container" id="toast-container"></div>

    <header>
      <div class="header-content">
        <h1>Texture Maker</h1>
        <span class="header-subtitle">Pixel Art Editor</span>
      </div>
    </header>

    <main>
      <aside class="toolbar" id="toolbar">
        <div class="toolbar-scroll">
          <div class="tool-section">
            <h3>Outils</h3>
            <div class="tool-buttons">
              <button class="tool-btn active" data-tool="pen" id="pen" data-tooltip="Stylo" data-shortcut="P">
                <i class="fas fa-pen"></i>
              </button>
              <button class="tool-btn" data-tool="eraser" id="eraser" data-tooltip="Gomme" data-shortcut="E">
                <i class="fas fa-eraser"></i>
              </button>
              <button class="tool-btn" data-tool="fill" id="fill" data-tooltip="Pot de peinture" data-shortcut="F">
                <i class="fas fa-fill"></i>
              </button>
              <button class="tool-btn" data-tool="color-picker" id="color-picker" data-tooltip="Pipette" data-shortcut="I">
                <i class="fas fa-eyedropper"></i>
              </button>
            </div>
          </div>

          <div class="tool-section">
            <h3>Couleur</h3>
            <label class="custom-color-label">
              <input type="color" id="custom-color" value="#74bb4a" />
            </label>
            <div class="recent-colors" id="recent-colors">
              <span class="recent-colors-label">Récentes</span>
              <div class="recent-colors-swatches" id="recent-colors-swatches"></div>
            </div>
          </div>

          <div class="tool-section">
            <h3>Grille</h3>
            <div class="grid-controls">
              <div class="checkbox-container">
                <input type="checkbox" id="grid-checkbox" checked />
                <label for="grid-checkbox" class="toggle"><span></span></label>
              </div>
              <select id="grid-size">
                <option value="16" selected>16 × 16</option>
                <option value="32">32 × 32</option>
                <option value="64">64 × 64</option>
              </select>
            </div>
          </div>

          <div class="tool-section">
            <h3>Ajustements</h3>
            <div class="slider-group">
              <label class="slider-label">
                <span>Teinte</span>
                <span id="hue-value">0°</span>
              </label>
              <input type="range" id="hue-range" min="-180" max="180" value="0" />
            </div>
            <div class="slider-group">
              <label class="slider-label">
                <span>Saturation</span>
                <span id="saturation-value">100%</span>
              </label>
              <input type="range" id="saturation-range" min="0" max="200" value="100" />
            </div>
            <div class="slider-group">
              <label class="slider-label">
                <span>Luminosité</span>
                <span id="brightness-value">100%</span>
              </label>
              <input type="range" id="brightness-range" min="0" max="200" value="100" />
            </div>
            <button class="secondary-btn" id="reset-filters-btn">
              <i class="fas fa-undo-alt"></i> Réinitialiser
            </button>
          </div>

          <div class="tool-section">
            <h3>Templates</h3>
            <button class="templates-btn" id="templates-btn">
              <i class="fas fa-image"></i>
              <span>Parcourir</span>
            </button>
          </div>

          <div class="tool-section">
            <h3>Raccourcis</h3>
            <div class="shortcuts-grid" id="shortcuts-grid">
              <span class="shortcut-item"><kbd>P</kbd> Stylo</span>
              <span class="shortcut-item"><kbd>E</kbd> Gomme</span>
              <span class="shortcut-item"><kbd>F</kbd> Remplir</span>
              <span class="shortcut-item"><kbd>I</kbd> Pipette</span>
              <span class="shortcut-item"><kbd>H</kbd> Grille</span>
              <span class="shortcut-item"><kbd>Ctrl+Z</kbd> Annuler</span>
              <span class="shortcut-item"><kbd>Ctrl+Y</kbd> Rétablir</span>
              <span class="shortcut-item"><kbd>Ctrl+S</kbd> Exporter</span>
            </div>
          </div>
        </div>

        <div class="bottom-toolbar">
          <button class="bottom-toolbar-btn danger" id="trash-btn">
            <i class="fa-solid fa-trash"></i> Effacer
          </button>
          <button class="bottom-toolbar-btn primary" id="export-btn">
            <i class="fa-solid fa-download"></i> Exporter PNG
          </button>
        </div>
      </aside>

      <div class="canvas-wrapper">
        <div class="canvas-container">
          <div class="canvas-border">
            <canvas class="canvas" id="canvas"></canvas>
          </div>
        </div>
        <div class="canvas-info" id="canvas-info">16 × 16 · 256 px</div>
      </div>
    </main>

    <div class="templates-modal-overlay" id="templates-modal-overlay">
      <div class="templates-modal" id="templates-modal">
        <div class="templates-modal-header">
          <h2>Templates</h2>
          <button class="templates-modal-close" id="templates-modal-close" aria-label="Fermer">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="templates-modal-content">
          <div class="templates-section">
            <h3>Blocs Minecraft</h3>
            <div class="templates-gallery" id="templates-gallery"></div>
          </div>
          <div class="templates-section upload-section">
            <h3>Importer un PNG</h3>
            <div class="upload-area" id="upload-area">
              <i class="fas fa-cloud-upload-alt"></i>
              <span>Cliquez ou glissez un fichier PNG</span>
              <input type="file" id="template-upload" accept=".png" />
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
