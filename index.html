<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Texture Maker</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Texture Maker</h1>
    </header>

    <main>
      <aside class="toolbar" id="toolbar">
        <div class="tool-section">
          <h3>Tools</h3>

          <div class="tool-buttons">
            <button class="tool-btn active" data-tool="pen" id="pen">
              <i class="fas fa-pen"></i>
            </button>

            <button class="tool-btn" data-tool="eraser" id="eraser">
              <i class="fas fa-eraser"></i>
            </button>

            <button class="tool-btn" data-tool="fill" id="fill">
              <i class="fas fa-fill"></i>
            </button>

            <button class="tool-btn" data-tool="color-picker" id="color-picker">
              <i class="fas fa-eyedropper"></i>
            </button>
          </div>
        </div>

        <div class="tool-section">
          <h3>Colors</h3>

          <label class="custom-color-label">
            <input type="color" id="custom-color" value="#74bb4a" />
          </label>
        </div>

        <div class="tool-section">
          <h3>Grid</h3>

          <div class="checkbox-container">
            <input type="checkbox" id="grid-checkbox" checked />
            <label for="grid-checkbox" class="toggle"><span></span></label>
          </div>

          <select id="grid-size">
            <option value="16" selected>16 x 16</option>
            <option value="32">32 x 32</option>
            <option value="64">64 x 64</option>
          </select>
        </div>

        <div class="tool-section">
          <h3>Ajustements</h3>

          <label class="slider-label">
            <span>Teinte</span>

            <span id="hue-value">0°</span>
          </label>

          <input type="range" id="hue-range" min="-180" max="180" value="0" />

          <label class="slider-label">
            <span>Saturation</span>

            <span id="saturation-value">100%</span>
          </label>
          <input
            type="range"
            id="saturation-range"
            min="0"
            max="200"
            value="100"
          />

          <label class="slider-label">
            <span>Luminosité</span>

            <span id="brightness-value">100%</span>
          </label>
          <input
            type="range"
            id="brightness-range"
            min="0"
            max="200"
            value="100"
          />

          <button class="adjustments-reset-btn" id="reset-filters-btn">
            Réinitialiser
          </button>
        </div>

        <div class="tool-section">
          <h3>Templates</h3>

          <button class="templates-btn" id="templates-btn">
            <i class="fas fa-image"></i>
          </button>
        </div>

        <div class="bottom-toolbar">
          <button class="bottom-toolbar-btn" id="trash-btn">
            <i class="fa-solid fa-trash"></i>
          </button>
          <button class="bottom-toolbar-btn" id="export-btn">
            Download PNG
          </button>
        </div>
      </aside>

      <div class="canvas-container">
        <canvas class="canvas" id="canvas"></canvas>
      </div>
    </main>

    <div class="templates-modal-overlay" id="templates-modal-overlay">
      <div class="templates-modal" id="templates-modal">
        <div class="templates-modal-header">
          <h2>Templates</h2>

          <button class="templates-modal-close" id="templates-modal-close">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="templates-modal-content">
          <div class="templates-section">
            <h3>Predefined Templates</h3>

            <div class="templates-gallery" id="templates-gallery"></div>
          </div>
          <div class="templates-section">
            <h3>Upload Custom PNG</h3>

            <input type="file" id="template-upload" accept=".png" />
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
